name: Refresh data warehouse

on:
  schedule:
    # Monthly on the 1st at 06:00 UTC — matches Rainy Day Fund publication cadence
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ingest sources
        run: node data/warehouse/ingest.mjs

      - name: Open PR with refreshed data
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data: refresh warehouse outputs"
          branch: data/auto-refresh
          title: "Data warehouse refresh — ${{ github.run_id }}"
          body: |
            Automated monthly refresh of the Maryland Budget data warehouse.

            **Changed files:** see diff · generated by `data/warehouse/ingest.mjs`.

            Merging this PR triggers a Vercel rebuild so the live site picks up the new numbers.
          add-paths: |
            data/warehouse/out/**
